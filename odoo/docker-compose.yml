version: '3.8'

services:
  web:
    image: odoo:19.0
    container_name: dar_alanwar_web
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./dar_elanwar:/mnt/extra-addons/dar_elanwar
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: dar_alanwar_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
      - ./server_backup:/docker-entrypoint-initdb.d/backup
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  odoo-web-data:
  odoo-db-data:
