<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BEAE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#008B7E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.15)"/>
    </pattern>
    <pattern id="islamicDots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="3" fill="rgba(255,255,255,0.1)"/>
      <circle cx="0" cy="0" r="2" fill="rgba(255,255,255,0.08)"/>
      <circle cx="60" cy="0" r="2" fill="rgba(255,255,255,0.08)"/>
      <circle cx="0" cy="60" r="2" fill="rgba(255,255,255,0.08)"/>
      <circle cx="60" cy="60" r="2" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" fill="url(#islamicDots)"/>
  <!-- Decorative wave -->
  <path d="M0 350 Q300 300 600 340 Q900 380 1200 320 L1200 400 L0 400Z" fill="rgba(0,0,0,0.1)"/>
  <path d="M0 370 Q300 330 600 360 Q900 390 1200 350 L1200 400 L0 400Z" fill="rgba(0,0,0,0.05)"/>
  <!-- Orange accent circle -->
  <circle cx="1050" cy="80" r="120" fill="url(#accent)"/>
  <circle cx="150" cy="320" r="80" fill="rgba(255,149,0,0.1)"/>
  <!-- Book icons scattered -->
  <g transform="translate(100, 80)" opacity="0.15">
    <rect x="0" y="0" width="40" height="50" rx="3" fill="white"/>
    <rect x="5" y="5" width="30" height="2" fill="#00BEAE"/>
    <rect x="5" y="11" width="25" height="2" fill="#00BEAE"/>
    <rect x="5" y="17" width="28" height="2" fill="#00BEAE"/>
  </g>
  <g transform="translate(300, 50) rotate(10)" opacity="0.12">
    <rect x="0" y="0" width="35" height="45" rx="3" fill="white"/>
    <rect x="5" y="5" width="25" height="2" fill="white"/>
    <rect x="5" y="11" width="20" height="2" fill="white"/>
  </g>
  <g transform="translate(900, 60) rotate(-5)" opacity="0.15">
    <rect x="0" y="0" width="45" height="55" rx="3" fill="white"/>
    <rect x="5" y="5" width="35" height="2" fill="white"/>
    <rect x="5" y="11" width="30" height="2" fill="white"/>
    <rect x="5" y="17" width="32" height="2" fill="white"/>
    <rect x="5" y="23" width="25" height="2" fill="white"/>
  </g>
  <!-- Open book center -->
  <g transform="translate(500, 120)" opacity="0.2">
    <path d="M0 30 Q50 0 100 30 L100 80 Q50 50 0 80Z" fill="white"/>
    <path d="M100 30 Q150 0 200 30 L200 80 Q150 50 100 80Z" fill="white"/>
    <line x1="100" y1="30" x2="100" y2="80" stroke="rgba(0,190,174,0.5)" stroke-width="1"/>
  </g>
  <!-- Graduation cap -->
  <g transform="translate(800, 150)" opacity="0.15">
    <polygon points="40,0 80,20 40,40 0,20" fill="white"/>
    <rect x="38" y="20" width="4" height="25" fill="white"/>
    <circle cx="40" cy="48" r="5" fill="white"/>
  </g>
  <!-- Pencil -->
  <g transform="translate(200, 200) rotate(30)" opacity="0.12">
    <rect x="0" y="0" width="8" height="60" rx="1" fill="white"/>
    <polygon points="0,60 8,60 4,72" fill="#FF9500" opacity="0.5"/>
  </g>
  <!-- Arabic decorative stars -->
  <g transform="translate(700, 90)" opacity="0.15">
    <polygon points="20,0 24,14 40,14 28,22 32,38 20,28 8,38 12,22 0,14 16,14" fill="white"/>
  </g>
  <g transform="translate(1100, 200)" opacity="0.1">
    <polygon points="15,0 18,10 30,10 21,17 24,28 15,21 6,28 9,17 0,10 12,10" fill="white"/>
  </g>
  <!-- Circular decorative frame -->
  <circle cx="600" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="600" cy="200" r="110" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,5"/>
  <!-- Floating circles -->
  <circle cx="80" cy="150" r="30" fill="rgba(255,149,0,0.15)"/>
  <circle cx="1120" cy="300" r="25" fill="rgba(255,149,0,0.1)"/>
  <circle cx="450" cy="50" r="15" fill="rgba(255,255,255,0.1)"/>
  <circle cx="750" cy="350" r="20" fill="rgba(255,255,255,0.08)"/>
</svg>